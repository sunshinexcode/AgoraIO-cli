version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: agora-cli
    binary: agora
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/AgoraIO/cli/internal/cli.version={{ .Version }}
      - -X github.com/AgoraIO/cli/internal/cli.commit={{ .ShortCommit }}
      - -X github.com/AgoraIO/cli/internal/cli.date={{ .Date }}

# Archive naming matches install.sh, install.ps1, and agora upgrade self-update.
# A legacy alias (agora-cli-go_*) is also published so older installed
# binaries whose embedded upgrade logic only knows the previous prefix can
# still self-update — the same self-healing idea as always fetching install.sh.
archives:
  - id: agora-cli
    ids: [agora-cli]
    name_template: 'agora-cli_{{ .Tag }}_{{ .Os }}_{{ .Arch }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
  - id: agora-cli-legacy-alias
    ids: [agora-cli]
    name_template: 'agora-cli-go_{{ .Tag }}_{{ .Os }}_{{ .Arch }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
  algorithm: sha256

# ---------------------------------------------------------------------------
# Software Bill of Materials (SBOM)
# Generates an SPDX 2.3 JSON SBOM per archive (and per Linux package) using
# Syft. The SBOMs ship as additional release assets so downstream auditors
# can verify the exact dependency set inside every published artifact.
#
# Requires `syft` on the runner. The release workflow installs it via
# anchore/sbom-action's bundled binary.
# ---------------------------------------------------------------------------
sboms:
  - id: archive
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"
  - id: package
    artifacts: package
    documents:
      - "${artifact}.spdx.json"

# ---------------------------------------------------------------------------
# Cosign signatures (keyless / OIDC)
# Signs every checksum file, archive SBOM, and Linux package SBOM with the
# release workflow's GitHub Actions OIDC token. The resulting transparency
# log entries are stored in Sigstore Rekor and verifiable with:
#
#   cosign verify-blob \
#     --certificate-identity-regexp '^https://github.com/AgoraIO/cli/' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     --signature <artifact>.sig --certificate <artifact>.pem <artifact>
#
# Requires `cosign` on the runner and `id-token: write` in release.yml
# (already granted for npm provenance).
# ---------------------------------------------------------------------------
signs:
  - id: cosign-keyless
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: checksum
    output: true

# Same approach for the Docker images we publish to GHCR. Cosign records the
# signature in the OCI registry alongside the image; verify with:
#
#   cosign verify ghcr.io/agoraio/agora-cli:<version> \
#     --certificate-identity-regexp '^https://github.com/AgoraIO/cli/' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
docker_signs:
  - id: cosign-keyless
    cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "${artifact}@${digest}"
    artifacts: manifests
    output: true

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  draft: false
  prerelease: auto
  make_latest: true

# Homebrew tap / Scoop bucket coming soon...
# Releases ship archives + checksums for install.sh / install.ps1.

# ---------------------------------------------------------------------------
# Linux packages (.deb, .rpm, .apk)
# These land in the GitHub release as artifacts.
# .deb files are also consumed by the apt-repo.yml workflow which publishes
# a signed apt repository to GitHub Pages.
# ---------------------------------------------------------------------------
nfpms:
  - id: linux-packages
    ids: [agora-cli]
    package_name: agora-cli
    vendor: Agora
    homepage: https://agora.io
    maintainer: Agora DevRel <devrel@agora.io>
    description: |-
      Agora developer onboarding CLI.
      Manage authentication, remote projects, and quickstart workflows.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin

# ---------------------------------------------------------------------------
# Docker images → GitHub Container Registry (GHCR)
# Requires: packages: write permission in release.yml
# Images: ghcr.io/{owner}/agora-cli:{version} and :latest
# ---------------------------------------------------------------------------
dockers:
  - id: linux-amd64
    ids: [agora-cli]
    goarch: amd64
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      # Docker requires lowercase registry paths; GitHub org names may be mixed case.
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:{{ .Version }}-amd64'
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:latest-amd64'
    build_flag_templates:
      - '--platform=linux/amd64'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.created={{ .Date }}'
      - '--label=org.opencontainers.image.source={{ .GitURL }}'

  - id: linux-arm64
    ids: [agora-cli]
    goarch: arm64
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:{{ .Version }}-arm64'
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:latest-arm64'
    build_flag_templates:
      - '--platform=linux/arm64'
      - '--label=org.opencontainers.image.version={{ .Version }}'
      - '--label=org.opencontainers.image.created={{ .Date }}'
      - '--label=org.opencontainers.image.source={{ .GitURL }}'

docker_manifests:
  - name_template: 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:{{ .Version }}'
    image_templates:
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:{{ .Version }}-amd64'
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:{{ .Version }}-arm64'
  - name_template: 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:latest'
    image_templates:
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:latest-amd64'
      - 'ghcr.io/{{ tolower .Env.GITHUB_REPOSITORY_OWNER }}/agora-cli:latest-arm64'
